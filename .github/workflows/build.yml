name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger a build manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: marathon-coach-app   # all commands run from here

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/coach.keystore

      - name: Inject credentials into gradle.properties
        run: |
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> gradle.properties
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: app/coach.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: marathon-coach-app
          path: marathon-coach-app/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
