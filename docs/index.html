<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏃 Sydney Half — Training Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --orange: #E64A19; --orange-light: #FF7043; --bg: #f4f5f7;
    --card: #fff; --text: #1a1a2e; --muted: #6b7280; --green: #2e7d32;
    --done: #c8e6c9; --current: #fff3e0; --upcoming: #f0f0f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); padding: 16px; max-width: 980px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
  .hero { background: linear-gradient(135deg, var(--orange), var(--orange-light));
          color: #fff; border-radius: 16px; padding: 24px; margin-bottom: 16px; }
  .hero h1 { font-size: 26px; }
  .hero .goal { font-size: 15px; opacity: .95; margin-top: 4px; }
  .countdown { display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap; }
  .countdown div { text-align: center; }
  .countdown .num { font-size: 32px; font-weight: 700; line-height: 1; }
  .countdown .lbl { font-size: 12px; opacity: .9; text-transform: uppercase; letter-spacing: .5px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .card { background: var(--card); border-radius: 14px; padding: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .card .v { font-size: 28px; font-weight: 700; color: var(--orange); }
  .card .l { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .panel { background: var(--card); border-radius: 14px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .panel h2 { font-size: 16px; margin-bottom: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid #eee; }
  th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .s-done { background: var(--done); color: var(--green); }
  .s-current { background: var(--current); color: var(--orange); }
  .s-upcoming { background: var(--upcoming); color: var(--muted); }
  .empty { color: var(--muted); font-style: italic; padding: 12px 0; }
  canvas { max-height: 280px; }
  .foot { text-align: center; color: var(--muted); font-size: 12px; margin: 20px 0; }
  .phase-Base{color:#1565c0} .phase-Endurance{color:#6a1b9a}
  .phase-Specific{color:#c62828} .phase-Taper{color:#2e7d32} .phase-Race{color:var(--orange);font-weight:700}
  .phase-10kPrep{color:#e65100} .phase-10kRace{color:var(--orange);font-weight:700}
  .phase-HalfBuild{color:#c62828}
  .races { display:flex; gap:12px; margin-top:14px; flex-wrap:wrap; }
  .race-chip { background:rgba(255,255,255,.18); border-radius:20px; padding:5px 14px;
               font-size:13px; display:flex; align-items:center; gap:6px; }
  .race-chip.next { background:rgba(255,255,255,.32); font-weight:600; }
  .race-chip .badge { background:#fff; color:var(--orange); border-radius:10px;
                      padding:1px 7px; font-size:11px; font-weight:700; }
</style>
</head>
<body>

<div class="hero">
  <h1 id="goal">🏃 Loading…</h1>
  <div class="goal" id="goalSub"></div>
  <div class="countdown">
    <div><div class="num" id="cdDays">–</div><div class="lbl" id="cdDaysLbl">days to race</div></div>
    <div><div class="num" id="cdWeek">–</div><div class="lbl">current week</div></div>
    <div><div class="num" id="cdProgress">–</div><div class="lbl">plan progress</div></div>
  </div>
  <div class="races" id="racesRow"></div>
</div>

<div class="cards">
  <div class="card"><div class="v" id="mTotal">–</div><div class="l">Total km run</div></div>
  <div class="card"><div class="v" id="mLongest">–</div><div class="l">Longest run (km)</div></div>
  <div class="card"><div class="v" id="mThisWeek">–</div><div class="l">This week (km / target)</div></div>
  <div class="card"><div class="v" id="mRuns">–</div><div class="l">Runs logged</div></div>
</div>

<div class="panel">
  <h2>Weekly volume — actual vs plan</h2>
  <canvas id="volChart"></canvas>
</div>

<div class="panel">
  <h2>Long run progression</h2>
  <canvas id="longChart"></canvas>
</div>

<div class="panel">
  <h2>Recent runs</h2>
  <div id="recentWrap"></div>
</div>

<div class="panel">
  <h2>Full training plan</h2>
  <div id="planWrap"></div>
</div>

<div class="foot" id="foot"></div>

<script>
async function load() {
  // cache-bust so the dashboard always shows the freshest data
  const res = await fetch('data.json?t=' + Date.now());
  const d = await res.json();

  document.getElementById('goal').textContent = '🏃 ' + d.goal;
  document.getElementById('goalSub').textContent =
    `${d.distance_km} km · Target: ${d.target}`;
  document.getElementById('cdWeek').textContent = `${d.current_week}/${d.total_weeks}`;
  document.getElementById('cdProgress').textContent =
    Math.round(d.current_week / d.total_weeks * 100) + '%';

  // Next event countdown
  const ne = d.next_event;
  if (ne) {
    document.getElementById('cdDays').textContent = Math.max(0, ne.days_to_event);
    document.getElementById('cdDaysLbl').textContent =
      `days to ${ne.distance_km < 21 ? '10km' : 'half'}`;
  } else {
    document.getElementById('cdDays').textContent = d.days_to_race;
  }

  // Race chips row
  const racesRow = document.getElementById('racesRow');
  (d.events || []).forEach(ev => {
    const isNext = d.next_event && ev.date === d.next_event.date;
    const past = ev.days_to_event < 0;
    const icon = ev.distance_km < 21 ? '🏁' : '🏆';
    const chip = document.createElement('div');
    chip.className = 'race-chip' + (isNext ? ' next' : '') + (past ? ' past' : '');
    chip.innerHTML = `${icon} ${ev.name}` +
      (isNext ? ` <span class="badge">${ev.days_to_event}d</span>` :
       past ? ` <span class="badge">done</span>` : ` · ${ev.date}`);
    racesRow.appendChild(chip);
  });

  const s = d.summary;
  document.getElementById('mTotal').textContent = s.total_km_run;
  document.getElementById('mLongest').textContent = s.longest_run_km;
  document.getElementById('mThisWeek').textContent =
    (s.this_week_actual ?? 0) + ' / ' + (s.this_week_target ?? '–');
  document.getElementById('mRuns').textContent = s.num_runs;

  const labels = d.weeks.map(w => 'W' + w.week);

  // Weekly volume: actual bars + target line
  new Chart(document.getElementById('volChart'), {
    data: {
      labels,
      datasets: [
        { type: 'bar', label: 'Actual km', data: d.weeks.map(w => w.actual_total),
          backgroundColor: '#FF7043', borderRadius: 4 },
        { type: 'line', label: 'Plan target', data: d.weeks.map(w => w.target_total),
          borderColor: '#1a1a2e', borderDash: [5,4], tension: .3, pointRadius: 0 }
      ]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } },
               scales: { y: { beginAtZero: true, title: { display: true, text: 'km' } } } }
  });

  // Long run progression: target line + actual points
  new Chart(document.getElementById('longChart'), {
    data: {
      labels,
      datasets: [
        { type: 'line', label: 'Target long run', data: d.weeks.map(w => w.target_long),
          borderColor: '#E64A19', tension: .3, pointRadius: 2, fill: false },
        { type: 'line', label: 'Actual longest', data: d.weeks.map(w => w.actual_long || null),
          borderColor: '#1565c0', backgroundColor: '#1565c0', pointRadius: 4, showLine: false }
      ]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } },
               scales: { y: { beginAtZero: true, title: { display: true, text: 'km' } } } }
  });

  // Recent runs table
  const rw = document.getElementById('recentWrap');
  if (!d.recent_runs.length) {
    rw.innerHTML = '<div class="empty">No runs logged yet — your first run will appear here after the next sync.</div>';
  } else {
    rw.innerHTML = '<table><tr><th>Date</th><th>Type</th><th>Dist</th><th>Time</th><th>Pace</th><th>HR</th></tr>' +
      d.recent_runs.map(r => `<tr>
        <td>${r.date}</td><td>${r.type}</td>
        <td>${r.distance_km ?? '–'} km</td>
        <td>${r.duration_min ?? '–'} min</td>
        <td>${r.pace ?? '–'}</td>
        <td>${r.avg_hr ?? '–'}</td></tr>`).join('') + '</table>';
  }

  // Full plan table
  document.getElementById('planWrap').innerHTML =
    '<table><tr><th>Wk</th><th>Phase</th><th>Dates</th><th>Target</th><th>Long</th><th>Actual</th><th></th></tr>' +
    d.weeks.map(w => `<tr>
      <td><b>${w.week}</b></td>
      <td class="phase-${w.phase.replace(/[\s-]/g,'')}">${w.phase}</td>
      <td>${w.start.slice(5)} → ${w.end.slice(5)}</td>
      <td>${w.target_total} km</td>
      <td>${w.target_long} km</td>
      <td>${w.actual_total || '–'} km</td>
      <td><span class="pill s-${w.state}">${w.state}</span></td></tr>`).join('') + '</table>';

  document.getElementById('foot').textContent =
    `Updated ${d.generated_at} · data from Samsung Health → Health Connect → Google Drive`;
}
load().catch(e => { document.getElementById('goal').textContent = '⚠️ Failed to load data'; console.error(e); });
</script>
</body>
</html>
